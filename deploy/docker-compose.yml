# Full local stack (PRD §15, §17 M6). `docker compose -f deploy/docker-compose.yml up`.
# M0 ships the topology; the app image + Grafana dashboards are finalized in M6.
# Ollama runs the LLM; Jaeger/Prometheus/Grafana provide observability.
name: sutradhar

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sutradhar:local
    environment:
      SUTRADHAR_ENV: prod
      SUTRADHAR_LOG_JSON: "true"
      SUTRADHAR_LLM__BASE_URL: http://ollama:11434
      SUTRADHAR_OBS__TRACING_ENABLED: "true"
      SUTRADHAR_OBS__OTLP_ENDPOINT: http://jaeger:4317
      SUTRADHAR_BACKEND__BASE_URL: http://mock-backend:8090
    ports:
      - "8080:8080"   # app + browser client
      - "9100:9100"   # /metrics
    depends_on: [ollama, jaeger, mock-backend]
    profiles: ["full"]

  mock-backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sutradhar:local
    command: ["uvicorn", "mock_backend.app:app", "--host", "0.0.0.0", "--port", "8090"]
    ports: ["8090:8090"]
    profiles: ["full"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama:/root/.ollama
    # GPU passthrough is optional; the PRD run path is CPU + partial offload.

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"     # OTLP gRPC

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  ollama:
