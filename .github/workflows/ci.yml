name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · types · tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      SUTRADHAR_ENV: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install (base + dev only — no ML wheels)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check sutradhar eval mock_backend tests

      - name: Ruff format check
        run: uv run ruff format --check sutradhar eval mock_backend tests

      - name: Black check
        run: uv run black --check sutradhar eval mock_backend tests

      - name: Mypy (strict, library)
        run: uv run mypy sutradhar

      - name: Pytest (unit; no models)
        run: uv run pytest -m "not slow and not gpu" --cov --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore

  # Placeholder for the M4 evaluation regression gate (PRD §11, K5).
  eval-gate:
    name: eval regression gate (M4)
    runs-on: ubuntu-latest
    if: false # enabled in M4
    steps:
      - run: echo "Eval regression gate is wired in M4."
